<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ПДР України</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="pdr-theme">
    <div id="app-container">
        
        <header class="app-header">
            <div class="header-left">
                <div class="logo-badge placeholder-img"></div>
            </div>
            <div class="header-right">
                <div class="badge lang-badge">
                    <span class="active-lang">ua</span> / <span>en</span>
                </div>
                <div class="profile-badge placeholder-img">
                    <span class="badge-count">1</span>
                </div>
            </div>
        </header>

        <main>
            <section id="title-area">
                <h1 class="main-heading">
                    Правила<br>
                    дорожнього <span class="accent-color">руху</span><br>
                    України
                </h1>
                <p class="tagline">Твоя безпека та впевненість на дорозі</p>
            </section>

            <div id="main-content-split">
                
                <section id="action-buttons-area">
                    <div class="buttons-grid">
                        <div class="card button-card" data-section="themes">
                            <div class="card-icon placeholder-img">📚</div>
                            <div class="card-details">
                                <h3 class="card-title">Теми</h3>
                                <p class="card-sub">Вивчено <span class="accent-color">12</span> тем з <span class="accent-color">34</span></p>
                            </div>
                        </div>
                        <div class="card button-card" data-section="exam">
                            <div class="card-icon placeholder-img">⏱️</div>
                            <div class="card-details">
                                <h3 class="card-title">Іспит</h3>
                                <p class="card-sub">Готовність <span class="accent-color">75%</span></p>
                            </div>
                        </div>
                        <div class="card button-card" data-section="signs">
                            <div class="card-icon placeholder-img">🛑</div>
                            <div class="card-details">
                                <h3 class="card-title">Знаки</h3>
                                <p class="card-sub">Вивчено <span class="accent-color">80</span> з <span class="accent-color">250</span></p>
                            </div>
                        </div>
                        <div class="card button-card" data-section="fines">
                            <div class="card-icon placeholder-img">💰</div>
                            <div class="card-details">
                                <h3 class="card-title">Штрафи</h3>
                                <p class="card-sub">Перевірка наявності</p>
                            </div>
                        </div>
                    </div>
                </section>
                
                <section id="hero-image-area">
                    <div class="hero-image-frame">
                        <img src="img/img1.webp" alt="Ілюстрація ПДР України" class="hero-image" loading="eager">
                    </div>
                </section>
            </div>

            <section id="cta-area">
                <div class="card cta-card">
                    <div class="cta-text">
                        <h2 class="cta-title">Вчитись легко з нами</h2>
                        <p class="cta-sub">Перевір свої знання, пройди тести</p>
                    </div>
                </div>
                <button class="main-cta-button">
                    <span class="btn-text">Продовжити навчання</span>
                    <span class="btn-icon">→</span>
                </button>
                
                <div class="placeholder-img bottom-image-placeholder"></div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
